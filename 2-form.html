<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/goit-js-hw-09/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <script type="module" crossorigin src="/goit-js-hw-09/assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
    <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/styles-imports-lk4t-vMA.css">
  </head>
  <body>
    <main>
      <div class="form-header">
        <h1>Form</h1>
        <a class="back-link" href="./index.html">Go back</a>
      </div>
      <div class="form-container">
        <form class="feedback-form" autocomplete="off">
          <label class="email">
            Email
            <input class="input-email" type="email" name="email" autofocus />
          </label>
          <label class="input-message">
            Message
            <textarea class="text-area" name="message" rows="8"></textarea>
          </label>
          <button class="button" type="submit">Submit</button>
        </form>
      </div>
    </main>
  </body>
</html>
